name: Windows Desktop Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "desktop/**"
      - "frontend/**"
      - "package.json"
      - "scripts/**"
      - ".github/workflows/windows-desktop.yml"

jobs:
  build:
    name: Build Windows desktop package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        shell: pwsh
        run: |
          & "$env:pythonLocation\python.exe" -m pip install --upgrade pip
          & "$env:pythonLocation\python.exe" -m pip install -e "backend[dev]" pyinstaller
          & "$env:pythonLocation\python.exe" -c "import fastapi, sqlalchemy, uvicorn, PyInstaller; print('backend deps ok')"

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Test desktop shell
        run: npm run test:desktop

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Windows backend sidecar
        shell: pwsh
        run: |
          Push-Location backend
          & "$env:pythonLocation\python.exe" -m PyInstaller pyinstaller.spec
          Pop-Location
          if (!(Test-Path "backend/dist/ailkg-backend.exe")) {
            throw "Windows backend sidecar was not created"
          }

      - name: Build Windows desktop package
        run: npm --prefix desktop run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-package
          path: |
            desktop/dist/*.exe
            desktop/dist/*.yml
            desktop/dist/*.blockmap
            backend/dist/ailkg-backend.exe
