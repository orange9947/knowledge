name: Windows Desktop Package

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "desktop/**"
      - "frontend/**"
      - "package.json"
      - ".github/workflows/windows-desktop.yml"

jobs:
  build:
    name: Build Windows desktop package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "backend[dev]" pyinstaller

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install desktop dependencies
        run: npm ci --prefix desktop

      - name: Test backend
        run: npm run test:backend

      - name: Test frontend
        run: npm run test:frontend

      - name: Test desktop shell
        run: npm run test:desktop

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Windows backend sidecar
        run: npm run build:backend:desktop

      - name: Build Windows desktop package
        run: npm --prefix desktop run dist:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload Windows desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-package
          path: |
            desktop/dist/*.exe
            desktop/dist/*.yml
            desktop/dist/*.blockmap
            backend/dist/ailkg-backend.exe
